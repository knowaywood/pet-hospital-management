appId: com.pethospital.app
productName: 宠物医院管理系统
copyright: Copyright © 2026
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
asar: true
linux:
  target:
    - AppImage
  category: Utility
mac:
  target:
    - dmg
  category: public.app-category.utilities
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 宠物医院管理
