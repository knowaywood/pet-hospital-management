appId: com.pethospital.app
productName: 宠物医院管理系统
copyright: Copyright © 2026
publish: null
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**
linux:
  target:
    - AppImage
  category: Utility
mac:
  target:
    - dmg
  category: public.app-category.utilities
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 宠物医院管理
